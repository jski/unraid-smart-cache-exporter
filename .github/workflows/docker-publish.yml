name: Docker Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-publish:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/unraid-smart-cache-exporter
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}

      - name: Build and publish PR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  promote-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve merged PR number
        id: pr
        run: |
          PR_NUMBER=$(curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "Could not resolve PR number for commit ${{ github.sha }}."
            exit 1
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Promote PR image to main tags (no rebuild)
        run: |
          SOURCE="ghcr.io/${{ github.repository_owner }}/unraid-smart-cache-exporter:pr-${{ steps.pr.outputs.number }}"
          SHA_TAG="ghcr.io/${{ github.repository_owner }}/unraid-smart-cache-exporter:sha-${{ github.sha }}"
          LATEST_TAG="ghcr.io/${{ github.repository_owner }}/unraid-smart-cache-exporter:latest"

          docker buildx imagetools create \
            "$SOURCE" \
            --tag "$SHA_TAG" \
            --tag "$LATEST_TAG"

  promote-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote SHA image to release tag (no rebuild)
        run: |
          SOURCE="ghcr.io/${{ github.repository_owner }}/unraid-smart-cache-exporter:sha-${{ github.sha }}"
          TARGET="ghcr.io/${{ github.repository_owner }}/unraid-smart-cache-exporter:${GITHUB_REF_NAME}"

          docker buildx imagetools create \
            "$SOURCE" \
            --tag "$TARGET"
