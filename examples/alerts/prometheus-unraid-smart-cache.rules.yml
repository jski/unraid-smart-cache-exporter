groups:
  - name: unraid-smart-cache-exporter
    rules:
      - alert: UnraidSmartCriticalSectorsNonZero
        expr: |
          max by (source_node, disk) (
            unraid_smart_pending_sectors{job="unraid-smart-cache-exporter"} > 0
            or
            unraid_smart_offline_uncorrectable{job="unraid-smart-cache-exporter"} > 0
          ) > 0
        for: 15m
        labels:
          severity: critical
          signal: smart
          component: disk-health
        annotations:
          summary: "Unraid SMART critical sector error on {{ $labels.disk }}"
          description: "Pending sectors or offline uncorrectable sectors are non-zero for 15m. Investigate disk health and backups immediately."
          runbook_url: "https://github.com/jski/unraid-smart-cache-exporter#readme"
          triage_query: "unraid_smart_pending_sectors{disk=\"{{ $labels.disk }}\"} or unraid_smart_offline_uncorrectable{disk=\"{{ $labels.disk }}\"}"

      - alert: UnraidSmartReallocatedSectorsDetected
        expr: |
          max by (source_node, disk) (
            unraid_smart_reallocated_sectors{job="unraid-smart-cache-exporter"} > 0
          ) > 0
        for: 1h
        labels:
          severity: warning
          signal: smart
          component: disk-health
        annotations:
          summary: "Unraid SMART reallocated sectors detected on {{ $labels.disk }}"
          description: "Reallocated sectors are non-zero for at least 1h. Track trend and plan replacement if count increases."
          runbook_url: "https://github.com/jski/unraid-smart-cache-exporter#readme"
          triage_query: "unraid_smart_reallocated_sectors{disk=\"{{ $labels.disk }}\"}"

      - alert: UnraidSmartSnapshotStale
        expr: |
          unraid_smart_snapshot_age_seconds{job="unraid-smart-cache-exporter"} > 86400
        for: 30m
        labels:
          severity: warning
          signal: smart
          component: disk-health
        annotations:
          summary: "Unraid SMART snapshot stale for {{ $labels.disk }}"
          description: "No fresh SMART snapshot seen for over 24h. Validate Unraid SMART polling behavior for this disk."
          runbook_url: "https://github.com/jski/unraid-smart-cache-exporter#readme"
          triage_query: "unraid_smart_snapshot_age_seconds{disk=\"{{ $labels.disk }}\"}"
