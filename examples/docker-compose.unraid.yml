name: unraid-smart-cache-exporter

services:
  unraid-smart-cache-exporter:
    image: ghcr.io/jski/unraid-smart-cache-exporter:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unraid-smart-cache-exporter
    restart: unless-stopped
    ports:
      - "9903:9903"
    environment:
      - LISTEN_PORT=9903
      - SMART_DIR=/var/local/emhttp/smart
      - DISKS_INI=/var/local/emhttp/disks.ini
      - SYSLOG_PATH=/var/log/syslog
      # Set this to your Unraid host timezone (IANA form), e.g. America/New_York.
      - SYSLOG_TIMEZONE=America/New_York
      - STATE_PATH=/var/lib/unraid-smart-cache-exporter/state.json
      - SYSLOG_INITIAL_TAIL_BYTES=4194304
      - EXCLUDE_NON_PRESENT=true
    volumes:
      - /var/local/emhttp/smart:/var/local/emhttp/smart:ro
      - /var/local/emhttp/disks.ini:/var/local/emhttp/disks.ini:ro
      - /var/log/syslog:/var/log/syslog:ro
      - /mnt/user/appdata/unraid-smart-cache-exporter:/var/lib/unraid-smart-cache-exporter
